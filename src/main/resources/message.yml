  outside-venue: "&c説明看板は会場リージョン内に設置してください。"
  already-registered: "&cこの看板はすでに別の会場またはゲームへ登録されています。"
  not-registered: "&c見ている看板は、このゲームの説明看板として登録されていません。"
  slot:
    name: "スロット"
    sign-name: "&1&lSLOT"
    rules:
      - "&e【遊び方】"
      - "&f1. スロット台に関連付けられた椅子へ座ります。"
      - "&f2. レバーを引くと、台ごとの賭け金を支払って開始します。"
      - "&f3. 3列のリールが停止すると結果が確定します。"
      - "&e【通常配当】"
      - "&72つ揃い: 賭け金の{pair}倍 / 鉄: {iron}倍 / エメラルド: {emerald}倍 / ダイヤ: {diamond}倍"
      - "&c銅が3つ揃うと全額没収です。"
      - "&6金が3つ揃うとGold Rushへ突入し、無料スピンが連鎖します。"
      - "&7Gold Rush中に銅が3つ揃うと、連鎖分も含めて全額没収です。"
  highlow:
    name: "ハイ＆ロー"
    sign-name: "&5&lHIGH & LOW"
    rules:
      - "&e【遊び方】"
      - "&f1. 台の椅子へ座り、中央の黒いボタンから賭け金を選んで開始します。"
      - "&f2. 次のカードが高いなら&cHIGH&f、低いなら&bLOW&fを選びます。"
      - "&f3. 正解すると獲得候補額が増え、続けて挑戦できます。"
      - "&f4. 中央ボタンを押すと、その時点の賞金を換金します。"
      - "&aカードごとの的中率に応じて、公平な倍率で獲得候補額が増加します。"
      - "&e同じ数字は引き分けとなり、もう一度選択できます。"
      - "&c予想を外すと獲得候補額はすべて没収されます。"
  crash:
    name: "クラッシュ"
    sign-name: "&4&lCRASH"
    rules:
      - "&e【遊び方】"
      - "&f1. 台の椅子へ座り、ボタンを押して賭け金を選びます。"
      - "&f2. 倍率は1.00倍から上昇します。"
      - "&f3. クラッシュする前に、開始時と同じボタンで換金します。"
      - "&a換金額は「賭け金 × 表示倍率」です。"
      - "&e{minimum}倍になるまでは換金できません。選べる賭け金: {bets}"
      - "&c換金前にクラッシュすると、賭け金は全額没収されます。"
      - "&7高倍率ほど賞金は増えますが、クラッシュする危険も高くなります。"
  roulette:
    name: "ルーレット"
    sign-name: "&6&lROULETTE"
    rules:
      - "&e【遊び方】"
      - "&f1. プレイボタンを押すと物理ルーレットの観戦位置へ移動します。"
      - "&f2. 物理台と同じ向きのGUIで、賭け金と賭け先を選びます。"
      - "&f3. 玉が停止した金マスに対応する数字・色で結果が決まります。"
      - "&e【払戻し】"
      - "&7赤黒・奇偶・LOW/HIGH: &f{half}倍"
      - "&74数字区画: &f{quarter}倍 &7/ 数字1点: &f{exact}倍"
      - "&7賭け金: &f{bets}"
      - "&cGUIを確定した後に途中退出すると、賭け金は没収されます。"
